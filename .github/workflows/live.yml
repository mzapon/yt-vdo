name: 24/7 Dropbox to YouTube Live

on:
  schedule:
    - cron: '0 */5 * * *' # প্রতি ৫ ঘণ্টা পর পর অটো-রিস্টার্ট হবে
  workflow_dispatch: # ম্যানুয়ালি চালু করার বাটন

jobs:
  live_stream:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Install FFmpeg
      run: |
        sudo apt-get update
        sudo apt-get install -y ffmpeg

    - name: Start Live Stream
      env:
        # আপনার দেওয়া ড্রপবক্স লিঙ্কটি এখানে raw=1 ফরম্যাটে সেট করা হয়েছে
        DROPBOX_VIDEO_URL: "https://www.dropbox.com/scl/fi/hdw1zh2u60id9rl8odh7y/videoplayback.mp4?rlkey=lpuhi5raoppc1p0ty7hj73wng&st=ehvvf62r&raw=1"
        MY_STREAM_KEY: ${{ secrets.MY_STREAM_KEY }}
      run: |
        echo "Starting stable and resilient 24/7 live stream from Dropbox..."
        
        if [ -z "$MY_STREAM_KEY" ]; then
          echo "❌ ERROR: MY_STREAM_KEY is missing in GitHub Secrets!"
          exit 1
        fi
        
        RETRY_DELAY=15
        while true; do
          echo "🚀 Starting ffmpeg stream from cloud storage..."
          
          # ড্রপবক্স থেকে ভিডিও নিয়ে রিয়েল-টাইমে ইউটিউব সার্ভারে পুশ করা হচ্ছে
          ffmpeg -re -i "$DROPBOX_VIDEO_URL" \
            -c:v copy -c:a aac -b:a 128k -ar 44100 \
            -f flv -flvflags no_duration_filesize \
            "rtmp://a.rtmp.youtube.com/live2/$MY_STREAM_KEY" || echo "⚠️ FFmpeg exited."
          
          echo "Video finished or connection dropped. Re-connecting in $RETRY_DELAY seconds..."
          sleep $RETRY_DELAY
        done

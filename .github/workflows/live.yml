name: 24/7 Dropbox to YouTube Live

on:
  schedule:
    - cron: '0 */4 * * *'  # প্রতি ৪ ঘণ্টায় অটো-রিস্টার্ট
  workflow_dispatch:

jobs:
  live_stream:
    runs-on: ubuntu-latest
    timeout-minutes: 350

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Install FFmpeg
      run: |
        sudo apt-get update -qq
        sudo apt-get install -y ffmpeg

    - name: Start Live Stream
      env:
        DROPBOX_VIDEO_URL: "https://www.dropbox.com/scl/fi/hdw1zh2u60id9rl8odh7y/videoplayback.mp4?rlkey=lpuhi5raoppc1p0ty7hj73wng&st=ehvvf62r&raw=1"
        MY_STREAM_KEY: ${{ secrets.MY_STREAM_KEY }}
      run: |
        if [ -z "$MY_STREAM_KEY" ]; then
          echo "❌ ERROR: MY_STREAM_KEY is missing in GitHub Secrets!"
          exit 1
        fi

        RETRY_DELAY=15
        while true; do
          echo "🚀 Starting stream from Dropbox..."

          # এখানে শেষে '|| true' যুক্ত করা হয়েছে যেন ভিডিও শেষ হলেও লুপ ভেঙে না যায়
          ffmpeg -re \
            -reconnect 1 \
            -reconnect_streamed 1 \
            -reconnect_delay_max 30 \
            -i "$DROPBOX_VIDEO_URL" \
            -c:v copy \
            -c:a aac -b:a 128k -ar 44100 \
            -af aresample=async=1 \
            -f flv \
            "rtmp://a.rtmp.youtube.com/live2/$MY_STREAM_KEY" || true

          EXIT_CODE=$?
          echo "⚠️ FFmpeg exited (code: $EXIT_CODE). Re-connecting in $RETRY_DELAY seconds..."
          sleep $RETRY_DELAY
        done

name: 24/7 YouTube to YouTube Live

on:
  schedule:
    - cron: '0 */5 * * *'
  workflow_dispatch:

jobs:
  live_stream:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Install FFmpeg and yt-dlp
      run: |
        sudo apt-get update
        sudo apt-get install -y ffmpeg
        # লেটেস্ট yt-dlp ডাউনলোড নিশ্চিত করা
        sudo wget https://github.com/yt-dlp/yt-dlp/releases/latest/download/yt-dlp -O /usr/local/bin/yt-dlp
        sudo chmod a+rx /usr/local/bin/yt-dlp

    - name: Start Live Stream
      env:
        SOURCE_YOUTUBE_URL: "https://www.youtube.com/watch?v=kSUjZBv5wXg"
        MY_STREAM_KEY: ${{ secrets.MY_STREAM_KEY }}
      run: |
        echo "Starting stable and resilient 24/7 live stream..."
        
        if [ -z "$MY_STREAM_KEY" ]; then
          echo "❌ ERROR: MY_STREAM_KEY is missing!"
          exit 1
        fi
        
        RETRY_DELAY=15
        MAX_RETRIES=30
        RETRY_COUNT=0
        
        while true; do
          echo "🔄 Fetching stream URLs via yt-dlp (Printing errors if any)..."
          
          # আসল এরর দেখতে দেওয়ার জন্য 2>/dev/null সরিয়ে দেওয়া হলো
          # এবং ইউটিউবের ব্লক এড়াতে ইউজার-এজেন্ট ফ্ল্যাগ যোগ করা হয়েছে
          VIDEO_URL=$(yt-dlp --user-agent "Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36" -g -f "bestvideo[ext=mp4]/bestvideo" "$SOURCE_YOUTUBE_URL" || echo "")
          AUDIO_URL=$(yt-dlp --user-agent "Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36" -g -f "bestaudio[ext=m4a]/bestaudio" "$SOURCE_YOUTUBE_URL" || echo "")
          
          if [ -z "$VIDEO_URL" ] || [ -z "$AUDIO_URL" ]; then
            RETRY_COUNT=$((RETRY_COUNT + 1))
            echo "⚠️ Attempt $RETRY_COUNT/$MAX_RETRIES: Link fetch failed. Retrying in $RETRY_DELAY seconds..."
            
            if [ $RETRY_COUNT -ge $MAX_RETRIES ]; then
              echo "❌ Max retries reached. Exiting workflow."
              exit 1
            fi
            
            sleep $RETRY_DELAY
            continue
          fi
          
          RETRY_COUNT=0
          echo "🚀 Starting ffmpeg stream..."
          ffmpeg -re -i "$VIDEO_URL" -re -i "$AUDIO_URL" \
            -map 0:v:0 -map 1:a:0 \
            -c:v copy -c:a aac -b:a 128k -ar 44100 \
            -f flv -flvflags no_duration_filesize \
            "rtmp://a.rtmp.youtube.com/live2/$MY_STREAM_KEY" || echo "⚠️ FFmpeg exited."
          
          sleep 5
        done
